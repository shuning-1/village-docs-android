  async function openExcelEditor(name, filename) {
    excelState = {
      filename, sheetName: '', name,
      headers: [], allRows: [], filteredRows: [],
      page: 1, pageSize: 50, total: 0,
      editedCells: {}, deletedRows: new Set(), addedRows: [],
      hasChanges: false,
      sheets: []  // 存储所有sheet数据（新后端多sheet格式）
    };
    // 先关闭子栏目面板
    const subOverlay = document.querySelector('.sub-overlay');
    if (subOverlay) subOverlay.remove();

    showToast('正在读取 ' + name + '...', 'info');
    // 新后端：不传sheet名则返回所有sheet
    const result = await apiCall('read_excel', [filename]);
    if (!result.success) {
      showToast(result.message || '读取失败', 'error');
      return;
    }
    // 新后端返回格式：{success, filename, sheets: [{name, headers, rows}], total_rows}
    excelState.sheets = result.sheets || [];
    excelState.sheetNames = (result.sheets || []).map(s => s.name);
    excelState.total = result.total_rows || 0;
    // 加载第一个sheet
    const firstSheet = excelState.sheets[0] || {name: '', headers: [], rows: []};
    excelState.sheetName = firstSheet.name || '';
    excelState.headers = firstSheet.headers || [];
    excelState.allRows = firstSheet.rows || [];
    excelState.filteredRows = [...excelState.allRows];
    excelState.page = 1;

    renderExcelPanel();
  }

  function renderExcelPanel() {
    // 移除旧面板
    const old = document.querySelector('.excel-overlay');
    if (old) old.remove();

    const s = excelState;
    const start = (s.page - 1) * s.pageSize;
    const end = Math.min(start + s.pageSize, s.filteredRows.length);
    const pageRows = s.filteredRows.slice(start, end);
    const totalPages = Math.max(1, Math.ceil(s.filteredRows.length / s.pageSize));

    let html = '<div class="excel-overlay" onclick="if(event.target===this)closeExcelEditor()">';
    html += '<div class="excel-panel">';

    // 头部
    html += '<div class="excel-header">';
    html += '<div class="excel-header-icon">📊</div>';
    html += '<div class="excel-header-info">';
    html += '<div class="excel-header-name">' + esc(s.name) + '</div>';
    html += '<div class="excel-header-meta">' + s.headers.length + '列 · ' + s.filteredRows.length + '行数据' + (s.hasChanges ? ' · <span style="color:#e74c3c;">有未保存的修改</span>' : '') + '</div>';
    html += '</div>';
    html += '<button class="excel-close" onclick="closeExcelEditor()">✕</button>';
    html += '</div>';

    // 工具栏
    html += '<div class="excel-toolbar">';
    html += '<input class="excel-search" type="text" placeholder="🔍 搜索内容..." data-excel-search value="' + esc(s.searchKeyword||'') + '" />';
    html += '<button class="excel-search-btn" data-excel-search-btn>搜索</button>';
    html += '<button class="excel-btn add-row" onclick="addExcelRow()">➕ 末尾新增行</button>';
    html += '<button class="excel-btn insert-row" onclick="insertExcelRowAbove()">⬆️ 上插行</button>';
    html += '<button class="excel-btn insert-row" onclick="insertExcelRowBelow()" style="background:linear-gradient(135deg,#f57c00,#e65100);">⬇️ 下插行</button>';
    html += '<button class="excel-btn del-row" onclick="deleteSelectedExcelRows()" id="excelDelRowBtn" style="display:none;">🗑️ 删除选中</button>';
    if (s.hasChanges) {
      html += '<button class="excel-btn save" onclick="saveExcelChanges()">💾 保存修改</button>';
      html += '<button class="excel-btn cancel" onclick="cancelExcelChanges()">撤销</button>';
    }
    html += '<button class="excel-btn open-file" onclick="openExcelFile()">📂 用Excel打开</button>';
    // Sheet标签
    if (s.sheetNames && s.sheetNames.length > 1) {
      html += '<div class="excel-sheet-tabs">';
      for (const sn of s.sheetNames) {
        html += '<button class="excel-sheet-tab' + (sn === s.sheetName ? ' active' : '') + '" onclick="switchExcelSheet(\'' + escAttr(sn) + '\')">' + esc(sn) + '</button>';
      }
      html += '</div>';
    }
    html += '</div>';

    // 表格
    html += '<div class="excel-table-wrap">';
    html += '<table class="excel-table"><thead><tr>';
    html += '<th class="row-num">#</th>';
    html += '<th class="row-del" style="width:28px;"><input type="checkbox" id="excelCheckAll" onchange="toggleAllExcelRows(this.checked)" /></th>';
    for (const h of s.headers) {
      html += '<th>' + esc(h) + '</th>';
    }
    html += '</tr></thead><tbody>';

    if (pageRows.length === 0) {
      html += '<tr><td colspan="' + (s.headers.length + 2) + '" style="text-align:center;padding:40px;color:#aaa;">暂无数据</td></tr>';
    } else {
      for (let i = 0; i < pageRows.length; i++) {
        const realIdx = start + i;
        const row = pageRows[i];
        const isDeleted = s.deletedRows.has(realIdx);
        const isAdded = s.addedRows.includes(realIdx);
        const edited = s.editedCells[realIdx] || {};

        let rowClass = '';
        if (isDeleted) rowClass = ' style="opacity:0.4;text-decoration:line-through;"';
        if (isAdded) rowClass = ' class="excel-new-row"';

        html += '<tr' + rowClass + ' oncontextmenu="showRowContextMenu(event,' + realIdx + ')">';
        html += '<td class="row-num">' + (realIdx + 1) + '</td>';
        html += '<td class="row-del"><input type="checkbox" class="excel-row-check" data-idx="' + realIdx + '" onchange="updateExcelDelBtn()" /></td>';
        for (let j = 0; j < s.headers.length; j++) {
          const val = (j in edited) ? edited[j] : (row[j] || '');
          const cellId = 'cell_' + realIdx + '_' + j;
          html += '<td ondblclick="editExcelCell(this,' + realIdx + ',' + j + ')" title="' + esc(String(val)) + '">' + esc(String(val)) + '</td>';
        }
        html += '</tr>';
      }
    }
    html += '</tbody></table></div>';

    // 底部
    html += '<div class="excel-footer">';
    html += '<div>共 ' + s.filteredRows.length + ' 条' + (s.filteredRows.length !== s.allRows.length ? ' (筛选自 ' + s.allRows.length + ' 条)' : '') + '</div>';
    html += '<div class="excel-paging">';
    html += '<button onclick="excelPrevPage()" ' + (s.page <= 1 ? 'disabled' : '') + '>上一页</button>';
    html += '<span>' + s.page + ' / ' + totalPages + '</span>';
    html += '<div class="page-jump">跳至 <input type="number" id="pageJumpInput" min="1" max="' + totalPages + '" value="' + s.page + '" /> 页 <button class="page-jump-btn" onclick="excelJumpPage()">确定</button></div>';
    html += '<button onclick="excelNextPage()" ' + (s.page >= totalPages ? 'disabled' : '') + '>下一页</button>';
    html += '</div>';
    html += '</div>';

    html += '</div></div>';
    document.body.insertAdjacentHTML('beforeend', html);
    document.body.style.overflow = 'hidden';

    // Excel搜索框：点击按钮或回车触发搜索
    const excelSearchEl = document.querySelector('[data-excel-search]');
    const excelSearchBtn = document.querySelector('[data-excel-search-btn]');
    if (excelSearchEl) {
      excelSearchEl.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') searchExcel(e.target.value);
      });
    }
    if (excelSearchBtn) {
      excelSearchBtn.addEventListener('click', function() {
        if (excelSearchEl) searchExcel(excelSearchEl.value);
      });
    }
    // 页码跳转回车触发
    const pageJumpInput = document.getElementById('pageJumpInput');
    if (pageJumpInput) {
      pageJumpInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') excelJumpPage();
      });
    }
  }

  function closeExcelEditor() {
    if (excelState.hasChanges) {
      if (!confirm('有未保存的修改，确定关闭？')) return;
    }
    closeOverlay('.excel-overlay');
  }

  function editExcelCell(td, rowIdx, colIdx) {
    if (excelState.deletedRows.has(rowIdx)) return;
    const currentVal = (excelState.editedCells[rowIdx] && excelState.editedCells[rowIdx][colIdx] !== undefined)
      ? excelState.editedCells[rowIdx][colIdx]
      : (excelState.filteredRows[rowIdx] && excelState.filteredRows[rowIdx][colIdx] || '');
    td.classList.add('editing');
    td.innerHTML = '<input type="text" value="' + escAttr(String(currentVal)) + '" '
      + 'onblur="finishEditExcelCell(this,' + rowIdx + ',' + colIdx + ')" '
      + 'onkeydown="if(event.key===\'Enter\')this.blur();if(event.key===\'Escape\'){this.dataset.cancel=\'1\';this.blur();}" '
      + '/>';
    td.querySelector('input').focus();
    td.querySelector('input').select();
  }

  function finishEditExcelCell(input, rowIdx, colIdx) {
    if (input.dataset.cancel === '1') {
      // 取消编辑
      cancelEditCell(rowIdx, colIdx);
      return;
    }
    const newVal = input.value;
    const oldVal = (excelState.filteredRows[rowIdx] && excelState.filteredRows[rowIdx][colIdx]) || '';

    if (newVal !== oldVal) {
      if (!excelState.editedCells[rowIdx]) excelState.editedCells[rowIdx] = {};
      excelState.editedCells[rowIdx][colIdx] = newVal;
      excelState.hasChanges = true;
    } else {
      // 恢复原值，移除编辑记录
      if (excelState.editedCells[rowIdx]) {
        delete excelState.editedCells[rowIdx][colIdx];
        if (Object.keys(excelState.editedCells[rowIdx]).length === 0) {
          delete excelState.editedCells[rowIdx];
        }
      }
    }
    // 检查是否还有未保存修改
    checkExcelChanges();
    renderExcelPanel();
  }

  function cancelEditCell(rowIdx, colIdx) {
    const currentVal = (excelState.editedCells[rowIdx] && excelState.editedCells[rowIdx][colIdx] !== undefined)
      ? excelState.editedCells[rowIdx][colIdx]
      : (excelState.filteredRows[rowIdx] && excelState.filteredRows[rowIdx][colIdx] || '');
    // 不保存修改，直接恢复显示
    renderExcelPanel();
  }

  function checkExcelChanges() {
    const hasEdits = Object.keys(excelState.editedCells).length > 0;
    const hasDeletes = excelState.deletedRows.size > 0;
    const hasAdds = excelState.addedRows.length > 0;
    excelState.hasChanges = hasEdits || hasDeletes || hasAdds;
  }

  function searchExcel(keyword) {
    excelState.searchKeyword = keyword;
    if (!keyword.trim()) {
      excelState.filteredRows = [...excelState.allRows];
    } else {
      const kw = keyword.trim().toLowerCase();
      excelState.filteredRows = excelState.allRows.filter(row =>
        row.some(cell => String(cell).toLowerCase().includes(kw))
      );
    }
    excelState.page = 1;
    renderExcelPanel();
  }

  function addExcelRow() {
    const newRow = new Array(excelState.headers.length).fill('');
    excelState.allRows.push(newRow);
    excelState.filteredRows.push(newRow);
    excelState.addedRows.push(excelState.filteredRows.length - 1);
    excelState.hasChanges = true;
    // 跳到最后一页
    excelState.page = Math.ceil(excelState.filteredRows.length / excelState.pageSize);
    renderExcelPanel();
    showToast('已添加新行，请双击单元格编辑内容', 'info');
  }

  // 在指定行上方插入新行

  function insertExcelRowAbove() {
    const checks = document.querySelectorAll('.excel-row-check:checked');
    let targetIdx = -1;
    if (checks.length > 0) {
      // 取选中的最小行号
      targetIdx = Math.min(...Array.from(checks).map(cb => parseInt(cb.dataset.idx)));
    } else {
      // 没选中行，在当前页第一行上方插入
      targetIdx = (excelState.page - 1) * excelState.pageSize;
    }
    if (targetIdx < 0) targetIdx = 0;
    _insertRowAt(targetIdx);
  }

  function insertExcelRowBelow() {
    const checks = document.querySelectorAll('.excel-row-check:checked');
    let targetIdx = -1;
    if (checks.length > 0) {
      // 取选中的最大行号
      targetIdx = Math.max(...Array.from(checks).map(cb => parseInt(cb.dataset.idx))) + 1;
    } else {
      // 没选中行，在当前页最后一行下方插入
      targetIdx = Math.min(excelState.page * excelState.pageSize, excelState.filteredRows.length);
    }
    if (targetIdx < 0) targetIdx = excelState.filteredRows.length;
    _insertRowAt(targetIdx);
  }

  function _insertRowAt(filteredIdx) {
    const newRow = new Array(excelState.headers.length).fill('');
    // 插入到 allRows 对应位置
    const allRowsIdx = filteredIdx < excelState.filteredRows.length
      ? excelState.allRows.indexOf(excelState.filteredRows[filteredIdx])
      : excelState.allRows.length;
    excelState.allRows.splice(allRowsIdx, 0, newRow);
    // 重新生成 filteredRows
    if (excelState.searchKeyword && excelState.searchKeyword.trim()) {
      const kw = excelState.searchKeyword.trim().toLowerCase();
      excelState.filteredRows = excelState.allRows.filter(row =>
        row.some(cell => String(cell).toLowerCase().includes(kw))
      );
    } else {
      excelState.filteredRows = [...excelState.allRows];
    }
    // 更新编辑记录（行号后移）
    const newEdited = {};
    for (const [ri, cols] of Object.entries(excelState.editedCells)) {
      const r = parseInt(ri);
      if (r >= allRowsIdx) {
        newEdited[r + 1] = cols;
      } else {
        newEdited[r] = cols;
      }
    }
    excelState.editedCells = newEdited;
    // 更新删除记录
    const newDeleted = new Set();
    for (const ri of excelState.deletedRows) {
      if (ri >= allRowsIdx) { newDeleted.add(ri + 1); } else { newDeleted.add(ri); }
    }
    excelState.deletedRows = newDeleted;
    // 更新新增行记录
    const newAdded = [];
    for (const ri of excelState.addedRows) {
      newAdded.push(ri >= allRowsIdx ? ri + 1 : ri);
    }
    newAdded.push(allRowsIdx);
    excelState.addedRows = newAdded;
    excelState.hasChanges = true;
    // 跳到插入行所在页
    excelState.page = Math.floor(filteredIdx / excelState.pageSize) + 1;
    renderExcelPanel();
    showToast('已在第 ' + (allRowsIdx + 1) + ' 行插入新行', 'info');
  }

  // 右键菜单
  function showRowContextMenu(e, rowIdx) {
    e.preventDefault();
    // 移除旧菜单
    const oldMenu = document.querySelector('.row-context-menu');
    if (oldMenu) oldMenu.remove();

    const menu = document.createElement('div');
    menu.className = 'row-context-menu';
    menu.style.left = e.clientX + 'px';
    menu.style.top = e.clientY + 'px';
    menu.innerHTML =
      '<div class="ctx-item" onclick="_insertRowAt(' + rowIdx + ');this.parentElement.remove();">⬆️ 上方插入行</div>' +
      '<div class="ctx-item" onclick="_insertRowAt(' + (rowIdx + 1) + ');this.parentElement.remove();">⬇️ 下方插入行</div>' +
      '<div class="ctx-divider"></div>' +
      '<div class="ctx-item danger" onclick="deleteExcelRowByCtx(' + rowIdx + ');this.parentElement.remove();">🗑️ 删除此行</div>';
    document.body.appendChild(menu);

    // 点击其他地方关闭菜单
    function closeMenu(ev) {
      if (!menu.contains(ev.target)) { menu.remove(); document.removeEventListener('click', closeMenu); }
    }
    setTimeout(function() { document.addEventListener('click', closeMenu); }, 10);
  }

  function deleteExcelRowByCtx(rowIdx) {
    excelState.deletedRows.add(rowIdx);
    checkExcelChanges();
    renderExcelPanel();
    showToast('已标记删除第 ' + (rowIdx + 1) + ' 行，请保存修改', 'info');
  }

  function updateExcelDelBtn() {
    const checks = document.querySelectorAll('.excel-row-check:checked');
    const btn = document.getElementById('excelDelRowBtn');
    if (btn) btn.style.display = checks.length > 0 ? '' : 'none';
  }

  function toggleAllExcelRows(checked) {
    document.querySelectorAll('.excel-row-check').forEach(cb => {
      cb.checked = checked;
    });
    updateExcelDelBtn();
  }

  function deleteSelectedExcelRows() {
    const checks = document.querySelectorAll('.excel-row-check:checked');
    if (checks.length === 0) return;
    if (!confirm('确定删除选中的 ' + checks.length + ' 行？')) return;

    const indices = [];
    checks.forEach(cb => indices.push(parseInt(cb.dataset.idx)));

    // 标记为删除
    for (const idx of indices) {
      excelState.deletedRows.add(idx);
    }
    checkExcelChanges();
    renderExcelPanel();
    showToast('已标记删除 ' + indices.length + ' 行，请保存修改', 'info');
  }

  async function saveExcelChanges() {
    // 构建最终数据：应用编辑、删除、新增
    const finalRows = [];
    for (let i = 0; i < excelState.allRows.length; i++) {
      if (excelState.deletedRows.has(i)) continue;
      const row = [...excelState.allRows[i]];
      // 应用单元格编辑
      if (excelState.editedCells[i]) {
        for (const [colIdx, newVal] of Object.entries(excelState.editedCells[i])) {
          row[parseInt(colIdx)] = newVal;
        }
      }
      finalRows.push(row);
    }

    showToast('正在保存...', 'info');
    // 新后端 save_excel API：传入当前sheet的数据
    const savePayload = {
      filename: excelState.filename,
      headers: excelState.headers,
      rows: finalRows,
      sheet_name: excelState.sheetName
    };
    // 同时更新excelState.sheets中的对应sheet
    const sheetIdx = excelState.sheets.findIndex(s => s.name === excelState.sheetName);
    if (sheetIdx >= 0) {
      excelState.sheets[sheetIdx].headers = excelState.headers;
      excelState.sheets[sheetIdx].rows = finalRows;
    }
    const result = await apiCall('save_excel', [savePayload]);
    if (result.success) {
      showToast('保存成功！', 'success');
      // 重新加载数据（从sheets中读，无需再调API）
      const firstSheet = excelState.sheets[0] || {name: '', headers: [], rows: []};
      excelState.headers = firstSheet.headers || [];
      excelState.allRows = firstSheet.rows || [];
      excelState.filteredRows = [...excelState.allRows];
      excelState.total = excelState.allRows.length;
      excelState.editedCells = {};
      excelState.deletedRows = new Set();
      excelState.addedRows = [];
      excelState.hasChanges = false;
      excelState.searchKeyword = '';
      renderExcelPanel();
    } else {
      showToast(result.message || '保存失败', 'error');
    }
  }

  function cancelExcelChanges() {
    if (!confirm('确定撤销所有修改？')) return;
    excelState.editedCells = {};
    excelState.deletedRows = new Set();
    excelState.addedRows = [];
    excelState.hasChanges = false;
    // 重新过滤
    if (excelState.searchKeyword) {
      searchExcel(excelState.searchKeyword);
    } else {
      excelState.filteredRows = [...excelState.allRows];
    }
    renderExcelPanel();
  }

  async function openExcelFile() {
    await openFileWithToast(excelState.filename, 'Excel文件');
  }

  async function switchExcelSheet(sheetName) {
    // 新后端已一次性返回所有sheet，直接从excelState.sheets中读取
    const sheet = excelState.sheets.find(s => s.name === sheetName);
    if (!sheet) {
      showToast('未找到sheet: ' + sheetName, 'error');
      return;
    }
    excelState.sheetName = sheet.name;
    excelState.headers = sheet.headers || [];
    excelState.allRows = sheet.rows || [];
    excelState.filteredRows = [...excelState.allRows];
    excelState.total = excelState.allRows.length;
    excelState.page = 1;
    excelState.editedCells = {};
    excelState.deletedRows = new Set();
    excelState.addedRows = [];
    excelState.hasChanges = false;
    renderExcelPanel();
  }

  function excelPrevPage() {
    if (excelState.page > 1) { excelState.page--; renderExcelPanel(); }
  }
  function excelNextPage() {
    const totalPages = Math.ceil(excelState.filteredRows.length / excelState.pageSize);
    if (excelState.page < totalPages) { excelState.page++; renderExcelPanel(); }
  }
  function excelJumpPage() {
    const totalPages = Math.max(1, Math.ceil(excelState.filteredRows.length / excelState.pageSize));
    const input = document.getElementById('pageJumpInput');
    if (!input) return;
    let p = parseInt(input.value);
    if (isNaN(p) || p < 1) p = 1;
    if (p > totalPages) p = totalPages;
    excelState.page = p;
    renderExcelPanel();
  }

  // ===== Word编辑器 =====
  let wordState = {
    filename: '', name: '',
    paragraphs: [], tables: [],
    hasChanges: false
  };

  async function openWordEditor(name, filename) {
    wordState = { filename, name, paragraphs: [], tables: [], hasChanges: false };
    const subOverlay = document.querySelector('.sub-overlay');
    if (subOverlay) subOverlay.remove();

    showToast('正在读取 ' + name + '...', 'info');
    const result = await apiCall('read_word', [filename]);
    if (!result.success) {
      if (result.is_old_doc) {
        showToast('旧版.doc格式不支持编辑，请先转换为.docx', 'error');
      } else {
        showToast(result.message || '读取失败', 'error');
      }
      return;
    }
    wordState.paragraphs = result.paragraphs || [];
    wordState.tables = result.tables || [];
    renderWordPanel();
  }

  function renderWordPanel() {
    const old = document.querySelector('.word-overlay');
    if (old) old.remove();

    const s = wordState;
    let html = '<div class="word-overlay" onclick="if(event.target===this)closeWordEditor()">';
    html += '<div class="word-panel">';

    // 头部
    html += '<div class="word-header">';
    html += '<div class="word-header-icon">📝</div>';
    html += '<div class="word-header-info">';
    html += '<div class="word-header-name">' + esc(s.name) + '</div>';
    html += '<div class="word-header-meta">' + s.paragraphs.length + '个段落 · ' + s.tables.length + '个表格' + (s.hasChanges ? ' · <span style="color:#e74c3c;">有未保存的修改</span>' : '') + '</div>';
    html += '</div>';
    html += '<button class="word-close" onclick="closeWordEditor()">✕</button>';
    html += '</div>';

    // 工具栏
    html += '<div class="word-toolbar">';
    if (s.hasChanges) {
      html += '<button class="word-btn save" onclick="saveWordChanges()">💾 保存修改</button>';
      html += '<button class="word-btn cancel" onclick="cancelWordChanges()">撤销</button>';
    }
    html += '<button class="word-btn open-file" onclick="openWordFile()">📂 用Word打开</button>';
    html += '</div>';

    // 内容区
    html += '<div class="word-content">';

    // 渲染段落
    for (const para of s.paragraphs) {
      let cls = 'word-para';
      if (para.is_heading) {
        cls += ' heading' + Math.min(para.heading_level || 1, 3);
      }
      const text = para.text || '';
      html += '<div class="' + cls + '" contenteditable="true" data-idx="' + para.index + '" onblur="wordParaEdited(this,' + para.index + ')" oninput="wordParaInput()">';
      html += esc(text);
      html += '</div>';
    }

    // 渲染表格
    if (s.tables.length > 0) {
      html += '<div style="margin-top:16px;padding-top:16px;border-top:2px solid #f0f0f0;">';
      html += '<div style="font-size:14px;font-weight:700;color:#1565c0;margin-bottom:12px;">📋 文档中的表格</div>';
      for (const table of s.tables) {
        html += '<table class="word-table">';
        const rows = table.rows || [];
        for (let ri = 0; ri < rows.length; ri++) {
          const tag = ri === 0 ? 'th' : 'td';
          html += '<tr>';
          for (const cell of rows[ri]) {
            html += '<' + tag + '>' + esc(cell || '') + '</' + tag + '>';
          }
          html += '</tr>';
        }
        html += '</table>';
      }
      html += '</div>';
    }

    html += '</div>';

    // 底部
    html += '<div class="word-footer">';
    html += '<div>💡 点击段落文字即可编辑</div>';
    html += '</div>';

    html += '</div></div>';
    document.body.insertAdjacentHTML('beforeend', html);
    document.body.style.overflow = 'hidden';
  }

  function wordParaInput() {
    if (!wordState.hasChanges) {
      wordState.hasChanges = true;
      // 更新工具栏显示
      const toolbar = document.querySelector('.word-toolbar');
      if (toolbar && !toolbar.querySelector('.word-btn.save')) {
        const saveBtn = document.createElement('button');
        saveBtn.className = 'word-btn save';
        saveBtn.textContent = '💾 保存修改';
        saveBtn.onclick = saveWordChanges;
        toolbar.insertBefore(saveBtn, toolbar.firstChild);
        const cancelBtn = document.createElement('button');
        cancelBtn.className = 'word-btn cancel';
        cancelBtn.textContent = '撤销';
        cancelBtn.onclick = cancelWordChanges;
        toolbar.insertBefore(cancelBtn, saveBtn.nextSibling);
      }
    }
  }

  function wordParaEdited(el, idx) {
    const newText = el.textContent || el.innerText;
    const para = wordState.paragraphs.find(p => p.index === idx);
    if (para && para.text !== newText) {
      para.text = newText;
      wordState.hasChanges = true;
    }
  }

  async function saveWordChanges() {
    // 收集所有段落文本
    const paras = document.querySelectorAll('.word-para[contenteditable]');
    const saveData = [];
    paras.forEach(el => {
      const idx = parseInt(el.dataset.idx);
      saveData.push({ index: idx, text: el.textContent || el.innerText });
    });

    showToast('正在保存...', 'info');
    const result = await apiCall('save_word', [wordState.filename, saveData]);
    if (result.success) {
      showToast('保存成功！', 'success');
      wordState.hasChanges = false;
      // 更新元数据显示
      const meta = document.querySelector('.word-header-meta');
      if (meta) {
        meta.innerHTML = wordState.paragraphs.length + '个段落 · ' + wordState.tables.length + '个表格';
      }
      const toolbar = document.querySelector('.word-toolbar');
      if (toolbar) {
        const saveBtn = toolbar.querySelector('.word-btn.save');
        const cancelBtn = toolbar.querySelector('.word-btn.cancel');
        if (saveBtn) saveBtn.remove();
        if (cancelBtn) cancelBtn.remove();
      }
    } else {
      showToast(result.message || '保存失败', 'error');
    }
  }

  function cancelWordChanges() {
    if (!confirm('确定撤销所有修改？')) return;
    wordState.hasChanges = false;
    renderWordPanel();
  }

  function closeWordEditor() {
    if (wordState.hasChanges) {
      if (!confirm('有未保存的修改，确定关闭？')) return;
    }
    closeOverlay('.word-overlay');
  }

  async function openWordFile() {
    await openFileWithToast(wordState.filename, 'Word文件');
  }

  // ===== 子栏目操作 =====
  async function addSubItem(itemId) {
    // 关闭子栏目面板
    const overlay = document.querySelector('.sub-overlay');
    if (overlay) overlay.remove();

    // 使用 select_file_for_item 获取文件列表
    try {
      const fileResult = await apiCall('select_file_for_item', ['__sub__' + itemId]);
      if (fileResult.success && fileResult.files && fileResult.files.length > 0) {
        showFilePicker(fileResult.files, async function(selectedFile) {
          const name = selectedFile.replace(/\.[^.]+$/, '').split('/').pop();
          const result = await apiCall('add_sub_item', [itemId, name, selectedFile]);
          if (result.success) {
            CONFIG = await apiCall('get_config');
            renderAll();
            showToast('子文档已添加', 'success');
            setTimeout(() => showSubItems(itemId), 300);
          } else {
            showToast(result.message || '添加失败', 'error');
          }
        });
      } else if (fileResult.success) {
        showToast('文件夹中没有可选择的文件', 'info');
      } else {
        showToast(fileResult.message || '获取文件列表失败', 'error');
      }
    } catch(e) { showToast('添加失败：' + e.message, 'error'); }
  }

  async function moveoutSubItem(subId) {
    if (!confirm('确定将该子文档移出此栏目？\n\n移出后文档会自动归到"未分类资料"中，不会丢失。')) return;
    try {
      const result = await apiCall('remove_sub_from_item', [subId]);
      if (result.success) {
        CONFIG = await apiCall('get_config');
        renderAll();
        // 关闭子栏目面板
        const overlay = document.querySelector('.sub-overlay');
        if (overlay) overlay.remove();
        showToast('"' + (result.moved_name||'子文档') + '" 已移出到未分类资料', 'success');
      } else {
        showToast(result.message || '移出失败', 'error');
      }
    } catch(e) { showToast('移出失败：' + e.message, 'error'); }
  }

  async function moveoutMainFile(itemId) {
    if (!confirm('确定将主文档从此栏目移出？\n\n移出后该栏目将不再关联文件，文档会自动归到"未分类资料"中。')) return;
    try {
      const result = await apiCall('remove_main_file', [itemId]);
      if (result.success) {
        CONFIG = await apiCall('get_config');
        renderAll();
        // 关闭子栏目面板
        const overlay = document.querySelector('.sub-overlay');
        if (overlay) overlay.remove();
        showToast('主文档已移出到未分类资料', 'success');
      } else {
        showToast(result.message || '移出失败', 'error');
      }
    } catch(e) { showToast('移出失败：' + e.message, 'error'); }
  }

  // 设置面板中的子文档操作
  async function settingsMoveoutSub(subId) {
    if (!confirm('确定将该子文档移出此栏目？\n\n移出后文档会自动归到"未分类资料"中，不会丢失。')) return;
    try {
      const result = await apiCall('remove_sub_from_item', [subId]);
      if (result.success) {
        await refreshAfterSave();
        showToast('"' + (result.moved_name||'子文档') + '" 已移出到未分类资料', 'success');
      } else {
        showToast(result.message || '移出失败', 'error');
      }
    } catch(e) { showToast('移出失败：' + e.message, 'error'); }
  }

  async function settingsMoveoutMain(itemId) {
    if (!confirm('确定将主文档从此栏目移出？\n\n移出后该栏目将不再关联文件，文档会自动归到"未分类资料"中。')) return;
    try {
      const result = await apiCall('remove_main_file', [itemId]);
      if (result.success) {
        await refreshAfterSave();
        showToast('主文档已移出到未分类资料', 'success');
      } else {
        showToast(result.message || '移出失败', 'error');
      }
    } catch(e) { showToast('移出失败：' + e.message, 'error'); }
  }

  async function settingsRenameSub(subId) {
    const newName = prompt('请输入新的子文档名称：');
    if (!newName || !newName.trim()) return;
    try {
      const result = await apiCall('update_sub_item', [subId, newName.trim(), null]);
      if (result.success) {
        await refreshAfterSave();
        showToast('已重命名', 'success');
      } else {
        showToast(result.message || '重命名失败', 'error');
      }
    } catch(e) { showToast('重命名失败：' + e.message, 'error'); }
  }

  async function settingsDeleteSub(subId) {
    if (!confirm('确定删除该子文档？（文档文件不会被删除，只是取消关联）')) return;
    try {
      const result = await apiCall('delete_sub_item', [subId]);
      if (result.success) {
        await refreshAfterSave();
        showToast('子文档已删除', 'success');
      } else {
        showToast(result.message || '删除失败', 'error');
      }
    } catch(e) { showToast('删除失败：' + e.message, 'error'); }
  }

  async function deleteSubItem(subId) {
    if (!confirm('确定删除该子文档？')) return;
    try {
      const result = await apiCall('delete_sub_item', [subId]);
      if (result.success) {
        CONFIG = await apiCall('get_config');
        renderAll();
        // 关闭子栏目面板
        const overlay = document.querySelector('.sub-overlay');
        if (overlay) overlay.remove();
        showToast('子文档已删除', 'success');
      } else {
        showToast(result.message || '删除失败', 'error');
      }
    } catch(e) { showToast('删除失败：' + e.message, 'error'); }
  }

  async function renameSubItem(subId) {
    const newName = prompt('请输入新的子文档名称：');
    if (!newName || !newName.trim()) return;
    try {
      const result = await apiCall('update_sub_item', [subId, newName.trim(), null]);
      if (result.success) {
        CONFIG = await apiCall('get_config');
        // 刷新子栏目面板
        const overlay = document.querySelector('.sub-overlay');
        if (overlay) overlay.remove();
        // 重新打开面板 - 找到所属item
        for (const cat of (CONFIG.categories||[])) {
          for (const item of (cat.items||[])) {
            for (const child of (item.children||[])) {
              if (child.id === subId) {
                showSubItems(item.id);
                break;
              }
            }
          }
        }
        showToast('已重命名', 'success');
      } else {
        showToast(result.message || '重命名失败', 'error');
      }
    } catch(e) { showToast('重命名失败：' + e.message, 'error'); }
  }

  async function changeSubFile(itemId, subIdOrMain) {
    try {
      let targetId = subIdOrMain;
      if (subIdOrMain === 'main') {
        targetId = itemId;
      }
      const fileResult = await apiCall('select_file_for_item', [targetId]);
      if (fileResult.success && fileResult.files && fileResult.files.length > 0) {
        showFilePicker(fileResult.files, async function(selectedFile) {
          // 根据targetId类型调用对应API
          let r;
          if (targetId === itemId) {
            // 更换主文档
            const item = findItemById(itemId);
            if (!item) { showToast('未找到栏目', 'error'); return; }
            r = await apiCall('update_item', [itemId, {
              name: item.name, desc: item.desc||'', color: item.color,
              emoji: item.emoji, file: selectedFile, badge: item.badge||''
            }]);
          } else {
            // 更换子文档
            r = await apiCall('update_sub_item', [targetId, null, selectedFile]);
          }
          if (r.success) {
            CONFIG = await apiCall('get_config');
            const overlay = document.querySelector('.sub-overlay');
            if (overlay) overlay.remove();
            showSubItems(itemId);
            showToast('文件已更换', 'success');
          } else {
            showToast(r.message || '更换失败', 'error');
          }
        });
      } else if (fileResult.success) {
        showToast('文件夹中没有可选择的文件', 'info');
      } else {
        showToast(fileResult.message || '获取文件列表失败', 'error');
      }
    } catch(e) { showToast('更换失败：' + e.message, 'error'); }
  }

  async function autoCategorizeForItem(itemId) {
    try {
      showToast('正在扫描新文件...', 'info');
      const result = await apiCall('auto_categorize_files');
      if (result.success) {
        CONFIG = await apiCall('get_config');
        renderAll();
        // 关闭旧面板，重新打开
        const overlay = document.querySelector('.sub-overlay');
        if (overlay) overlay.remove();
        // 检查这个item是否还有子栏目
        const item = findItemById(itemId);
        if (item && (item.children || []).length > 0) {
          showSubItems(itemId);
        }
        if (result.matched > 0) {
          showToast('发现 ' + result.matched + ' 个新文件已自动归类', 'success');
        } else {
          showToast('未发现新的可归类文件', 'info');
        }
      } else {
        showToast(result.message || '扫描失败', 'error');
      }
    } catch(e) { showToast('扫描失败：' + e.message, 'error'); }
  }

  // ===== 通用 =====
  let toastTimer;
  function showToast(msg, type) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.className = 'toast' + (type ? ' ' + type : '');
    void toast.offsetWidth;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { toast.classList.remove('show'); }, 2500);
  }

  // 搜索（点击按钮或回车触发，避免IME兼容问题）
  const searchInputEl = document.getElementById('searchInput');

  function doCardSearch() {
    const keyword = searchInputEl.value.trim().toLowerCase();
    document.querySelectorAll('.card').forEach(card => {
      const name = card.dataset.name.toLowerCase();
      card.classList.toggle('hidden', keyword && !name.includes(keyword));
    });
  }

  // 回车也触发搜索
  searchInputEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doCardSearch();
  });

  // 日期
  function updateDate() {
    const now = new Date();
    const days = ['日','一','二','三','四','五','六'];
    const dateEl = document.getElementById('dateDisplay');
    const weekEl = document.getElementById('weekDisplay');
    if (dateEl) dateEl.textContent = now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日';
    if (weekEl) weekEl.textContent = '星期' + days[now.getDay()];
  }
  updateDate();
  setInterval(updateDate, 60000);

  // ===== 初始化（HTTP方式，不需要等待pywebviewready） =====
  let initDone = false;
  let initRetries = 0;
  const MAX_INIT_RETRIES = 10;  // 最多重试10次，共约5秒

  async function init() {
    if (initDone) return;
    try {
      let hasConfig = await apiCall('has_config');
      initDone = true;
      if (hasConfig) {
        CONFIG = await apiCall('get_config');
        hideLoading();
        showMainUI();
        setTimeout(checkAllFilesLazy, 300);
        // 启动后自动检测新文件
        setTimeout(checkNewFilesOnStart, 1500);
        // 登录后自动检查提醒，有未读消息则更新角标
        setTimeout(checkRemindersOnLogin, 2000);
      } else {
        hideLoading();
        showWizard();
      }
    } catch(e) {
      initRetries++;
      if (initRetries < MAX_INIT_RETRIES) {
        // 服务器可能还没准备好，500ms后重试
        setTimeout(init, 500);
      } else {
        // 重试次数用完，显示手动按钮
        document.getElementById('loadingSpinner').style.display = 'none';
        document.getElementById('loadingText').textContent = '连接服务器失败';
        document.getElementById('loadingBtn').style.display = 'inline-block';
        document.getElementById('loadingHint').style.display = 'block';
      }
    }
  }

  // ===== 启动时检测新文件 =====
  async function checkNewFilesOnStart() {
    try {
      const result = await apiCall('check_new_files');
      if (result.success && result.new_count > 0) {
        showNewFilesBanner(result.new_count, result.new_files);
      }
    } catch(e) { /* 静默失败 */ }
  }

  function showNewFilesBanner(count, files) {
    // 移除旧横幅
    const old = document.getElementById('newFilesBanner');
    if (old) old.remove();

    const banner = document.createElement('div');
    banner.id = 'newFilesBanner';
    banner.className = 'new-files-banner';
    banner.innerHTML = `
      <div class="nfb-icon">🔔</div>
      <div class="nfb-info">
        <div class="nfb-title">发现 ${count} 个新文件未归类</div>
        <div class="nfb-desc">${files.slice(0, 3).map(f => f.name_no_ext).join('、')}${count > 3 ? ' 等' : ''}</div>
      </div>
      <button class="nfb-btn auto" onclick="doAutoCategorize()">🧠 自动归类</button>
      <button class="nfb-btn ignore" onclick="this.parentElement.remove()">暂不处理</button>
    `;
    document.body.appendChild(banner);
  }

  // ===== 登录后自动检查提醒（仅更新角标，不弹窗） =====
  async function checkRemindersOnLogin() {
    try {
      const data = await apiCall('get_birthday_reminders');
      if (data && data.success) {
        updateRemindBadge(data.unread || 0);
      }
    } catch(e) { /* 静默失败 */ }
  }

  async function doAutoCategorize() {
    const banner = document.getElementById('newFilesBanner');
    if (banner) banner.remove();
    try {
      showToast('正在智能分类...', 'info');
      const result = await apiCall('auto_categorize_files');
      if (result.success) {
        CONFIG = await apiCall('get_config');
        renderAll();
        showCategorizeResult(result);
      } else {
        showToast(result.message || '分类失败', 'error');
      }
    } catch(e) { showToast('分类失败：' + e.message, 'error'); }
  }

  function manualInit() {
    initDone = false;
    initRetries = 0;
    document.getElementById('loadingSpinner').style.display = 'block';
    document.getElementById('loadingText').textContent = '系统加载中...';
    document.getElementById('loadingBtn').style.display = 'none';
    document.getElementById('loadingHint').style.display = 'none';
    init();
  }

  function hideLoading() {
    const el = document.getElementById('loading');
    if (el) el.classList.add('hide');
  }

  // DOM加载完成后加载登录配置（不自动init，等登录成功后再init）
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() { setTimeout(loadLoginConfig, 200); });
  } else {
    setTimeout(loadLoginConfig, 200);
  }
</script>
</body>
