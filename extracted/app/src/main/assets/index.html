  // 年龄分布环形图（SVG + 悬浮tooltip）
  // 年龄分布隐藏状态
  let ageHiddenState = {};

  function renderAgeChart(ageDist) {
    const container = document.getElementById('chartAgePie');
    if (!container) return;
    const rawData = ageDist || {'0-17岁': 0, '18-35岁': 0, '36-59岁': 0, '60-79岁': 0, '80岁以上': 0};
    const allChartData = [
      { key: '0-17岁', label: '0-17岁', value: rawData['0-17岁'] || 0, color: '#42A5F5' },
      { key: '18-35岁', label: '18-35岁', value: rawData['18-35岁'] || 0, color: '#66BB6A' },
      { key: '36-59岁', label: '36-59岁', value: rawData['36-59岁'] || 0, color: '#FFB74D' },
      { key: '60-79岁', label: '60-79岁', value: rawData['60-79岁'] || 0, color: '#EF5350' },
      { key: '80岁以上', label: '80岁以上', value: rawData['80岁以上'] || 0, color: '#90CAF9' }
    ];

    // 应用隐藏状态，只显示未隐藏的数据
    const chartData = allChartData.filter(d => !ageHiddenState[d.key]);
    const total = chartData.reduce((s, d) => s + d.value, 0);

    // 即使总数为0（全部隐藏），也渲染空图
    const w = 320, h = 280, cx = w / 2 - 30, cy = h / 2, r = 95, innerR = 55;

    let svg = '<svg viewBox="0 0 ' + w + ' ' + h + '" width="100%" height="' + h + '" class="donut-svg" style="max-width:340px;">';

    if (total > 0) {
      let startAngle = -90;
      let pathIdx = 0;
      chartData.forEach(d => {
        if (d.value === 0) return;
        const angle = d.value / total * 360;
        if (angle <= 0) return;
        const endAngle = startAngle + angle;
        const x1 = cx + r * Math.cos(startAngle * Math.PI / 180);
        const y1 = cy + r * Math.sin(startAngle * Math.PI / 180);
        const x2 = cx + r * Math.cos(endAngle * Math.PI / 180);
        const y2 = cy + r * Math.sin(endAngle * Math.PI / 180);
        const ix1 = cx + innerR * Math.cos(startAngle * Math.PI / 180);
        const iy1 = cy + innerR * Math.sin(startAngle * Math.PI / 180);
        const ix2 = cx + innerR * Math.cos(endAngle * Math.PI / 180);
        const iy2 = cy + innerR * Math.sin(endAngle * Math.PI / 180);
        const largeArc = angle > 180 ? 1 : 0;
        const pct = total > 0 ? (d.value / total * 100).toFixed(1) : 0;

        const pathD = 'M' + x1 + ',' + y1 +
          ' A' + r + ',' + r + ' 0 ' + largeArc + ',1 ' + x2 + ',' + y2 +
          ' L' + ix2 + ',' + iy2 +
          ' A' + innerR + ',' + innerR + ' 0 ' + largeArc + ',0 ' + ix1 + ',' + iy1 + ' Z';

        svg += '<path d="' + pathD + '" fill="' + d.color + '" stroke="#fff" stroke-width="1.5"';
        svg += ' class="chart-seg" data-label="' + esc(d.label) + '" data-value="' + d.value + '"';
        svg += ' style="cursor:pointer;transition:all 0.25s ease;transform-origin:' + cx + 'px ' + cy + 'px;"';
        svg += ' onmouseenter="showPieTip(this)"';
        svg += ' onmouseleave="hidePieTip()"';
        svg += '/>';
        startAngle = endAngle;
        pathIdx++;
      });
    } else {
      // 全部隐藏时显示空心环
      svg += '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" stroke="#eee" stroke-width="' + (r-innerR) + '"/>';
    }

    // 中心文字 - 显示可见数据的总人数
    const displayTotal = total > 0 ? total : '-';
    svg += '<text x="' + cx + '" y="' + (cy - 6) + '" text-anchor="middle" font-size="24" font-weight="700" fill="#e74c3c">' + displayTotal + '</text>';
    svg += '<text x="' + cx + '" y="' + (cy + 14) + '" text-anchor="middle" font-size="12" fill="#999">总人数</text>';
    svg += '</svg>';

    // 右侧图例（可点击隐藏/显示）
    let legendHtml = '<div class="pie-legend">';
    allChartData.forEach(d => {
      const isHidden = !!ageHiddenState[d.key];
      const fullPct = (d.value / (rawData['0-17岁']||0+rawData['18-35岁']||0+rawData['36-59岁']||0+rawData['60-79岁']||0+rawData['80岁以上']||0) * 100).toFixed(1);
      legendHtml += '<div class="pie-legend-item" onclick="toggleAgeGroup(\'' + d.key + '\')" title="点击' + (isHidden ? '显示' : '隐藏') + '此年龄段" style="cursor:pointer;' + (isHidden ? 'opacity:0.4;text-decoration:line-through;' : '') + '">';
      legendHtml += '<span class="pie-legend-dot" style="background:' + d.color + ';' + (isHidden ? '' : '') + '"></span>';
      legendHtml += '<span class="pie-legend-label">' + d.label + '</span>';
      legendHtml += '<span class="pie-legend-val">' + d.value + '人</span>';
      legendHtml += '</div>';
    });
    legendHtml += '</div>';

    // 悬浮tooltip容器（固定在图表区域内）
    const tipHtml = '<div id="pieTooltip" class="chart-tooltip" style="display:none;position:absolute;z-index:100;"></div>';

    container.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;gap:10px;position:relative;">' + svg + legendHtml + tipHtml + '</div>';

    // 填充文件下拉列表
    populateRemindFileSelect();
  }

  function toggleAgeGroup(key) {
    if (ageHiddenState[key]) {
      delete ageHiddenState[key];

  // 人口分布柱状图（SVG + 悬浮tooltip）
  function renderPopChart(groupDist) {
    const container = document.getElementById('chartPopBar');
    if (!container) return;
    const dataMap = groupDist || {};
    const data = Object.entries(dataMap).map(([k,v]) => ({ label: k, value: v }));
    if (data.length === 0 || data.every(d => d.value === 0)) {
      container.innerHTML = '<div style="text-align:center;padding:40px;color:#999;">暂无分组数据（Excel中需含"组"或"组别"列）</div>';
      return;
    }

    const maxVal = Math.max(...data.map(d => d.value));
    const colors = ['#42A5F5','#66BB6A','#FFA726','#EF5350','#9B59B6','#1ABC9C','#E74C3C'];
    const w = 420, h = 240, padLeft = 40, padBottom = 32, padTop = 16, barW = Math.min(40, (w - padLeft) / data.length - 8), gap = (w - padLeft) / data.length;

    let svg = '<svg viewBox="0 0 ' + w + ' ' + h + '" width="100%" height="' + h + '" class="bar-svg">';

    // Y轴刻度线
    for (let i = 0; i <= 5; i++) {
      const yv = h - padBottom - (h - padTop - padBottom) * i / 5;
      const v = Math.round(maxVal * i / 5);
      svg += '<line x1="' + padLeft + '" y1="' + yv + '" x2="' + (w - 12) + '" y2="' + yv + '" stroke="#f0f0f0" stroke-width="1"/>';
      svg += '<text x="' + (padLeft - 7) + '" y="' + (yv + 3) + '" text-anchor="end" font-size="9" fill="#aaa">' + v + '</text>';
    }

    // 柱子
    data.forEach((d, i) => {
      const bh = (d.value / maxVal) * (h - padTop - padBottom);
      const bx = padLeft + gap * i + (gap - barW) / 2;
      const by = h - padBottom - bh;
      const c = colors[i % colors.length];
      svg += '<rect class="bar-rect" data-val="' + d.value + '" data-lbl="' + d.label + '" x="' + bx + '" y="' + by + '" width="' + barW + '" height="' + bh + '" fill="' + c + '" rx="4" opacity="0.88" style="cursor:pointer;transition:all 0.25s;"';
      svg += ' onmouseenter="showBarTip(this,' + d.value + ',\'' + esc(d.label) + '\',\'' + c + '\')"';
      svg += ' onmouseleave="hideBarTip(this)"';
      svg += '>';
      svg += '<animate attributeName="height" from="0" to="' + bh + '" dur="0.6s" fill="freeze"/>';
      svg += '<animate attributeName="y" from="' + (h - padBottom) + '" to="' + by + '" dur="0.6s" fill="freeze"/>';
      svg += '</rect>';
      svg += '<text x="' + (bx + barW / 2) + '" y="' + (h - 10) + '" text-anchor="middle" font-size="11" fill="#666" font-weight="500">' + d.label + '</text>';
    });

    svg += '</svg>';

    // 悬浮tooltip
    const tipHtml = '<div id="barTooltip" class="chart-tooltip" style="display:none;"></div>';
    container.innerHTML = svg + tipHtml;
  }

  async function saveDashConfig() {
    const items = document.querySelectorAll('.config-card-item');
    const newCards = [];
    items.forEach((item, idx) => {
      const nameInput = item.querySelector('[data-field="name"]');
      const colorSel = item.querySelector('[data-field="color"]');
      const iconSel = item.querySelector('[data-field="icon"]');
      const calcTypeSel = item.querySelector('[data-field="calc_type"]');
      const fileSel = item.querySelector('[data-field="file"]');
      const manualInput = item.querySelector('[data-field="manual_value"]');
      const cardId = dashboardCards[idx] ? dashboardCards[idx].id : "dc_" + Date.now() + "_" + idx;
      newCards.push({
        "id": cardId,
        "name": nameInput ? nameInput.value : '',
        "icon": iconSel ? iconSel.value : '📊',
        "color": colorSel ? colorSel.value : '#e74c3c',
        "file": fileSel ? fileSel.value : '',

  async function doFullSearch() {
    const keyword = document.getElementById('fullSearchInput').value.trim();

    document.getElementById('searchResults').innerHTML = '<div style="text-align:center;padding:40px;color:#999;">正在搜索...</div>';
    try {
      const data = await apiCall('search_files', [keyword]);
      if (!data.success) { throw new Error(data.message || '搜索失败'); }
      let html = `<div style="margin-bottom:16px;color:#666;font-size:14px;">共在 ${data.total_files} 个文件中找到 ${data.total_matches} 处匹配「${data.keyword}」</div>`;
      if (data.results.length === 0) {
        html += '<div style="text-align:center;padding:40px;color:#999;">没有找到匹配结果</div>';
      } else {
        data.results.forEach(r => {
          html += `<div class="search-result-item" onclick="apiCall('open_file',['${r.file.replace(/'/g,"\\'")}'])">
            <div class="sr-header">
              <span class="sr-file">📄 ${r.name}</span>
              <span class="sr-cat">${r.cat_name}</span>
              <span class="sr-count">${r.match_count} 处匹配</span>
            </div>`;
          r.matches.forEach(m => {
            const context = m.context.replace(new RegExp('(' + keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi'), '<mark>$1</mark>');
            html += `<div class="sr-match">第${m.row}行：${context}</div>`;
          });
          html += '</div>';
        });
      }
      document.getElementById('searchResults').innerHTML = html;
    } catch(e) {
      document.getElementById('searchResults').innerHTML = '<div style="text-align:center;padding:40px;color:#e74c3c;">搜索失败：' + e.message + '</div>';
    }

    html += '</select>';
    html += '</div>';
    html += '<button onclick="loadReminders()" title="刷新数据" style="padding:5px 14px;background:#f0f0f0;border:1px solid #ddd;border-radius:6px;font-size:12px;cursor:pointer;">🔄 刷新</button>';
    html += '</div>';

    // 标签栏
    html += '<div class="remind-tab-bar">';
    const tabs = [
      { key: 'all', label: '全部' },
      { key: 'unread', label: '未读' },
      { key: 'read', label: '已读' }
    ];
    tabs.forEach(t => {
      const active = remindFilter.tab === t.key ? 'active' : '';
      html += '<span class="remind-tab ' + active + '" onclick="switchRemindTab(\'' + t.key + '\')">' + t.label + '</span>';
    });
    html += '</div>';

    // 工具栏
    html += '<div class="remind-toolbar">';
    html += '<input type="text" placeholder="搜索姓名/内容..." value="' + esc(remindFilter.keyword) + '" oninput="remindFilter.keyword=this.value;renderReminders();" style="flex:1;min-width:160px;padding:6px 12px;border:1px solid #ddd;border-radius:18px;font-size:12px;font-family:inherit;" />';
    html += '<label style="font-size:12px;color:#888;">状态</label>';
    html += '<select onchange="remindFilter.status=this.value;renderReminders();">';
    html += '<option value="">全部</option>';
    html += '<option value="unread"' + (remindFilter.status==='unread'?' selected':'') + '>未读</option>';
    html += '<option value="read"' + (remindFilter.status==='read'?' selected':'') + '>已读</option>';
    html += '</select>';
    html += '<button class="remind-btn remind-btn-primary" onclick="renderReminders()">查询</button>';
    html += '<button class="remind-btn remind-btn-default" onclick="resetRemindFilter()">重置</button>';
    html += '<span style="flex:1;"></span>';
    html += '<button class="remind-btn remind-btn-warn" onclick="batchRemindAction(\'delete\')" title="删除选中">🗑 删除选中</button>';
    html += '<button class="remind-btn remind-btn-danger" onclick="batchRemindAction(\'deleteAll\')" title="清空所有提醒">🗑 清空全部</button>';
    html += '<button class="remind-btn remind-btn-success" onclick="batchRemindAction(\'markRead\')" title="标为已读" style="background:#ecfdf5;color:#059669;border:1px solid #a7f3d0;">✅ 标为已读</button>';
    html += '</div>';

    // 过滤数据
    let filtered = (data.reminders || []).filter(r => {
      if (remindFilter.tab === 'unread') {
        if (r.is_read) return false;
      } else if (remindFilter.tab === 'read') {
        if (!r.is_read) return false;
      }

      if (remindFilter.type && r.category !== remindFilter.type) return false;
      if (remindFilter.status === 'unread' && r.is_read) return false;
      if (remindFilter.status === 'read' && !r.is_read) return false;
      if (remindFilter.keyword) {
        const kw = remindFilter.keyword.toLowerCase();
        const matchTitle = (r.title || '').toLowerCase().includes(kw);
        const matchDetail = (r.detail || '').toLowerCase().includes(kw);
        if (!matchTitle && !matchDetail) return false;
      }
      return true;
    });

    // 表格
    html += '<div class="remind-table-wrap">';
    html += '<table class="remind-table">';
    html += '<thead><tr><th class="remind-checkbox"><input type="checkbox" id="selectAllRemind" onchange="toggleSelectAll(this)" /></th>';
    html += '<th>姓名 / 提醒内容</th><th>剩余时间</th><th>状态</th><th>联系电话</th><th>操作</th></tr></thead>';
    html += '<tbody>';

    const totalItems = filtered.length;
    const totalPages = Math.max(1, Math.ceil(totalItems / remindPage.size));
    if (remindPage.current > totalPages) remindPage.current = totalPages;
    const startIdx = (remindPage.current - 1) * remindPage.size;
    const pageItems = filtered.slice(startIdx, startIdx + remindPage.size);

    if (pageItems.length === 0) {
      html += '<tr><td colspan="6" style="text-align:center;padding:40px;color:#999;">暂无60岁到期提醒数据，请先关联包含身份证号的Excel文件</td></tr>';
    } else {
      pageItems.forEach(r => {
        // 已读/未读状态
        const readClass = r.is_read ? 'remind-status-read' : 'remind-status-unread';
        const readText = r.is_read ? '已读' : '未读';

        html += '<tr>';
        html += '<td class="remind-checkbox"><input type="checkbox" class="remind-cb" data-id="' + esc(r.id) + '" /></td>';
        html += '<td class="remind-title-cell">';
        html += '<div class="remind-title-main">' + esc(r.title) + '</div>';
        let subText = r.detail || '';
        if (!r.phone || !r.has_phone) {
          subText = subText.replace('联系电话：', '');
        }
        if (subText) {
          // 截断过长的详情
          if (subText.length > 80) subText = subText.substring(0, 80) + '...';
          html += '<div class="remind-sub-text">' + subText + '</div>';
        }
        html += '</td>';

        // 剩余天数列
        html += '<td style="font-size:12px;white-space:nowrap;">';
        if (r.days_left <= 0 && r.days_left > -365) {
          html += '<span style="color:#dc2626;font-weight:700;background:#fee2e2;padding:3px 8px;border-radius:4px;">已过期' + Math.abs(r.days_left) + '天</span>';
        } else if (r.days_left === 0) {
          html += '<span style="color:#dc2626;font-weight:700;background:#fee2e2;padding:3px 8px;border-radius:4px;">今天！</span>';
        } else if (r.days_left <= 7) {
          html += '<span style="color:#d97706;font-weight:700;background:#fef3c7;padding:3px 8px;border-radius:4px;">还有' + r.days_left + '天</span>';
        } else if (r.days_left <= 30) {
          html += '<span style="color:#059669;font-weight:600;background:#ecfdf5;padding:3px 8px;border-radius:4px;">' + r.days_left + '天后</span>';
        } else {
          html += '<span style="color:#999">' + r.birthday_date + '</span>';
        }
        html += '</td>';

        html += '<td><span class="remind-status-tag ' + readClass + '">' + readText + '</span></td>';

        // 电话列
        html += '<td style="font-size:12px;">';
        if (r.phone) {
          html += '<span style="color:#2563eb;">📱 ' + esc(r.phone) + '</span>';
        } else {
          html += '<span style="color:#ccc;">-</span>';
        }
        html += '</td>';

        // 操作列
        html += '<td style="white-space:nowrap;">';
        html += '<button onclick="markSingleRemindRead(\'' + esc(r.id) + '\')" style="padding:3px 8px;background:#ecfdf5;color:#059669;border:1px solid #a7f3d0;border-radius:4px;cursor:pointer;font-size:11px;font-family:inherit;margin-right:4px;" title="标为已读">已读</button>';
        html += '<button onclick="deleteSingleRemind(\'' + esc(r.id) + '\')" style="padding:3px 8px;background:#fef2f2;color:#dc2626;border:1px solid #fecaca;border-radius:4px;cursor:pointer;font-size:11px;font-family:inherit;" title="删除此条提醒">删除</button>';
        html += '</td>';
        html += '</tr>';
      });
    }

    html += '</tbody></table>';

    // 分页栏
    html += '<div class="remind-pagination">';
    html += '<span>共 ' + totalItems + ' 条</span>';
    html += '<div class="remind-page-btns">';
    html += '<button onclick="goRemindPage(1,' + totalPages + ')"' + (remindPage.current<=1?' disabled':'') + '>&lt;</button>';
    html += '<button onclick="goRemindPage('+(remindPage.current-1)+','+totalPages+')"'+(remindPage.current<=1?' disabled':'')+'>&lsaquo;</button>';
    for (let p=1; p<=Math.min(totalPages,3); p++) {
      html += '<button onclick="goRemindPage('+p+','+totalPages+')"'+(p===remindPage.current?' style="background:#3498db;color:#fff;border-color:#3498db;"':'')+'>'+p+'</button>';
    }
    if (totalPages>3) html += '<span style="padding:0 4px;">...</span>';
    html += '<button onclick="goRemindPage('+(remindPage.current+1)+','+totalPages+')"'+(remindPage.current>=totalPages?' disabled':'')+'&rsaquo;</button>';
    html += '<button onclick="goRemindPage('+totalPages+','+totalPages+')"'+(remindPage.current>=totalPages?' disabled':'')+'&gt;</button>';
    html += '</div>';
    html += '<span>前往 <input type="number" class="remind-page-input" value="'+remindPage.current+'" min="1" max="'+totalPages+'" onkeydown="if(event.key===\'Enter\'){goRemindPage(parseInt(this.value),'+totalPages+')}" /> 页</span>';
    html += '</div>'; // end pagination

    html += '</div>'; // end table-wrap

    // 浮动帮助按钮
    html += '<div style="position:fixed;right:20px;bottom:80px;width:40px;height:40px;border-radius:50%;background:#3498db;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 12px rgba(52,152,219,0.4);font-size:18px;z-index:99;" title="帮助">?</div>';

    document.getElementById('remindersContent').innerHTML = html;
  }

  function switchRemindTab(tabKey) {
    remindFilter.tab = tabKey;
    remindPage.current = 1;
    renderReminders();
  }

  function resetRemindFilter() {
    remindFilter = { tab: 'all', keyword: '', type: '', status: '' };
    remindPage.current = 1;
    renderReminders();
  }

  function goRemindPage(page, total) {
    page = Math.max(1, Math.min(page, total));
    remindPage.current = page;
    renderReminders();
  }

  function toggleSelectAll(cb) {
    document.querySelectorAll('.remind-cb').forEach(c => c.checked = cb.checked);
  }

  function batchRemindAction(action) {
    const checked = [...document.querySelectorAll('.remind-cb:checked')];
    if (action === 'deleteAll') {
      if (!confirm('确定要清空所有提醒吗？此操作不可撤销！')) return;
      // 获取所有提醒ID
      const allIds = (remindData.reminders || []).map(r => r.id);
      apiCall('dismiss_all_reminders', [allIds]).then(() => {
        showToast('已清空所有提醒', 'success');
        loadReminders();
      }).catch(e => showToast('操作失败：' + e.message, 'error'));
      return;
    }
    if (checked.length === 0) {
      showToast('请先选择要删除的项目', 'error'); return;
    }
    const ids = checked.map(c => c.getAttribute('data-id'));
    switch(action) {
      case 'delete':
        if (!confirm('确定删除选中的 ' + ids.length + ' 条提醒吗？')) return;
        apiCall('dismiss_reminders', [ids]).then(res => {
          showToast('已删除 ' + res.dismissed_count + ' 条提醒', 'success');
          loadReminders();
        }).catch(e => showToast('删除失败', 'error'));
        break;
      case 'markRead':
        apiCall('mark_reminder_read', [ids]).then(() => {
          showToast('已标为已读', 'success');
          loadReminders();
        }).catch(e => showToast('操作失败', 'error'));
        break;
      default:
        break;
    }
  }

  async function deleteSingleRemind(id) {
    if (!confirm('确定删除这条提醒吗？')) return;
    try {
      await apiCall('dismiss_reminders', [[id]]);
      showToast('已删除', 'success');
      loadReminders();
    } catch(e) {
      showToast('删除失败', 'error');
    }
  }

  async function markSingleRemindRead(id) {
    try {
      await apiCall('mark_reminder_read', [[id]]);
      showToast('已标为已读', 'success');
      loadReminders();
    } catch(e) {
      showToast('操作失败', 'error');
    }
  }

  // ===== 开具证明 =====
  let certTemplates = [];
  let certList = [];
  let selectedCertType = null;

  // 更新头部提醒角标
  function updateRemindBadge(count) {
    const badge = document.getElementById('remindBadge');
    if (!badge) return;
    if (count > 0) {
      badge.textContent = count > 99 ? '99+' : count;
      badge.style.display = '';
      badge.style.animation = 'none';
      void badge.offsetWidth; // 触发reflow
      badge.style.animation = 'badgePulse 0.4s ease';
    } else {
      badge.style.display = 'none';
    }
  }

  async function loadCertificates() {
    const container = document.getElementById('certContent');
    container.innerHTML = '<div class="templates-loading">正在加载证明数据...</div>';
    try {
      // 加载模板和已开证明列表
      const [tplData, listData] = await Promise.all([
        apiCall('get_cert_templates'),
        apiCall('get_certificates')
      ]);
      certTemplates = tplData.templates || [];
      certList = listData.certificates || [];

      let html = '';

      // 顶部提示
      html += '<div class="cert-tip-bar">💡 选择证明模版，填写信息，一键开具并打印。填写信息前请核对，快速生成证明文件</div>';

      // 选择证明模板区
      html += '<div style="margin-bottom:18px;">';
      html += '<div class="section-title" style="margin-bottom:10px;">📋 选择证明模版</div>';
      html += '<div class="cert-tpl-grid">';
      certTemplates.forEach(tpl => {
        html += '<div class="cert-tpl-card" onclick="selectCertType(\'' + tpl.id + '\')" data-tpl-id="' + tpl.id + '">';
        html += '<div class="cert-tpl-icon">' + tpl.icon + '</div>';
        html += '<div class="cert-tpl-name">' + esc(tpl.name) + '</div>';
        html += '<div class="cert-tpl-desc">' + esc(tpl.desc) + '</div>';
        html += '</div>';
      });
      html += '</div></div>';

      // 已开证明列表
      html += '<div class="cert-list-section">';
      html += '<div class="section-title" style="margin-bottom:10px;">📄 已开证明 （' + certList.length + '份）</div>';
      html += '<div class="cert-table-wrap"><table class="cert-table">';
      html += '<thead><tr><th>编号</th><th>申请人</th><th>证明类型</th><th>用途</th><th>开具日期</th><th>状态</th><th>开单人</th><th>操作</th></tr></thead>';
      html += '<tbody>';
      if (certList.length === 0) {
        html += '<tr><td colspan="8" style="text-align:center;color:#999;padding:30px;">暂无开具记录，请选择上方模板开具新证明</td></tr>';
      } else {
        // 倒序显示（最新的在前）
        [...certList].reverse().forEach(cert => {
          const statusClass = cert.status === '已开具' ? 'done' : 'pending';
          html += '<tr>';
          html += '<td>' + esc(cert.code) + '</td>';
          html += '<td>' + esc(cert.applicant) + '</td>';
          html += '<td>' + esc(cert.type_name) + '</td>';
          html += '<td>' + (esc(cert.purpose || '-')) + '</td>';
          html += '<td>' + (cert.issue_date || '').substring(0, 10) + '</td>';
          html += '<td><span class="status-badge ' + statusClass + '">' + esc(cert.status) + '</span></td>';
          html += '<td>' + esc(cert.issuer || '-') + '</td>';
          html += '<td class="cert-actions-cell">';
          html += '<button class="cert-action-btn" title="查看" onclick="viewCert(' + cert.id + ')">👁️</button>';
          html += '<button class="cert-action-btn" title="打印" onclick="printCert(' + cert.id + ')">🖨️</button>';
          html += '<button class="cert-action-btn" title="删除" onclick="deleteCert(' + cert.id + ')" style="color:#e74c3c;">🗑️</button>';
          html += '</td></tr>';
        });
      }
      html += '</tbody></table></div></div>';

      container.innerHTML = html;

    } catch(e) {
      container.innerHTML = '<div style="text-align:center;padding:40px;color:#e74c3c;">加载失败：' + e.message + '</div>';
    }
  }

  function selectCertType(tplId) {
    selectedCertType = certTemplates.find(t => t.id === tplId);
    if (!selectedCertType) return;

    // 高亮选中状态
    document.querySelectorAll('.cert-tpl-card').forEach(el => {
      el.classList.toggle('active', el.dataset.tplId === tplId);
    });

    openCertForm(selectedCertType);
  }

  function openCertForm(tpl) {
    let html = '<div class="cert-form-overlay" onclick="if(event.target===this){this.remove();document.body.style.overflow=\'\'}">';
    html += '<div class="cert-form-card">';
    html += '<h3>' + tpl.icon + ' ' + esc(tpl.name) + '</h3>';

    // 表单字段
    tpl.fields.forEach(field => {
      const isSelect = field === '性别' || field === '婚姻状况' || field === '民族';
      if (isSelect && field === '性别') {
        html += '<div class="cert-form-group"><label>' + esc(field) + '</label>';
        html += '<select id="cf_' + escAttr(field) + '"><option value="">请选择</option><option value="男">男</option><option value="女">女</option></select></div>';
      } else if (isSelect && field === '婚姻状况') {
        html += '<div class="cert-form-group"><label>' + esc(field) + '</label>';
        html += '<select id="cf_' + escAttr(field) + '"><option value="">请选择</option><option value="已婚">已婚</option><option value="未婚">未婚</option><option value="离异">离异</option><option value="丧偶">丧偶</option></select></div>';
      } else if (isSelect && field === '民族') {
        html += '<div class="cert-form-group"><label>' + esc(field) + '</label>';
        html += '<select id="cf_' + escAttr(field) + '"><option value="">请选择</option><option value="汉族">汉族</option><option value="少数民族">少数民族</option></select></div>';
      } else {
        let defaultVal = '';
        if ((field.includes('日期') || field === '出生日期') && !field.includes('止')) defaultVal = new Date().toLocaleDateString('zh-CN');
        html += '<div class="cert-form-group"><label>' + esc(field) + '</label>';
        html += '<input type="text" id="cf_' + escAttr(field) + '" placeholder="请输入' + esc(field) + '" value="' + defaultVal + '" /></div>';
      }
    });

    // 用途（单独字段）
    html += '<div class="cert-form-group"><label>用途说明</label>';
    html += '<input type="text" id="cf_purpose" placeholder="如：办理xx业务、申请xx等" /></div>';
    // 开单人
    html += '<div class="cert-form-group"><label>开单人</label>';
    html += '<input type="text" id="cf_issuer" placeholder="经办人姓名" value="" /></div>';

    html += '<div class="cert-form-actions">';
    html += '<button class="btn-cancel" onclick="cancelCertForm()">取消</button>';
    html += '<button class="btn-save" onclick="submitCertForm()" style="background:linear-gradient(135deg,#8B0000,#C41E3A);color:#fff;">✍️ 开具证明</button>';
    html += '</div></div></div>';

    document.body.insertAdjacentHTML('beforeend', html);
    document.body.style.overflow = 'hidden';

    // 聚焦第一个字段
    setTimeout(() => { const firstInput = document.querySelector('.cert-form-card input'); if (firstInput) firstInput.focus(); }, 100);
  }

  async function submitCertForm() {
    if (!selectedCertType) return;
    const fields = {};
    for (const field of selectedCertType.fields) {
      const el = document.getElementById('cf_' + field.replace(/[（）()]/g, ''));
      // 也尝试原始字段名
      const el2 = document.querySelector('[id^="cf_' + field.split('').slice(0,4).join('') + '"]');
      const target = el || el2 || document.querySelector(`[id*="${field.substring(0,2)}"]`);
      fields[field] = target ? target.value : '';
    }
    const purpose = document.getElementById('cf_purpose').value;
    const issuer = document.getElementById('cf_issuer').value;

    // 找到申请人姓名（通常是第一个字段）
    const applicantName = fields[selectedCertType.fields[0]] || '';

    try {
      const result = await apiCall('add_certificate', [{
        "type_id": selectedCertType.id,
        "type_name": selectedCertType.name,
        "applicant": applicantName,
        "fields": fields,
        "purpose": purpose,
        "issuer": issuer
      }]);
      if (result.success) {
        showToast('证明已开具！可点击打印按钮打印', 'success');
        cancelCertForm();
        loadCertificates(); // 刷新列表
      }
    } catch(e) {
      showToast('开具失败：' + e.message, 'error');
    }
  }

  function cancelCertForm() {
    closeOverlay('.cert-form-overlay');
  }

  async function viewCert(certId) {
    const cert = certList.find(c => c.id === certId);
    if (!cert) return;
    // 显示证明详情弹窗（打印预览格式）
    const tpl = certTemplates.find(t => t.id === cert.type_id) || {};
    let html = '<div class="cert-form-overlay" onclick="if(event.target===this){this.remove();document.body.style.overflow=\'\'}">';
    html += '<div class="print-cert print-area">';
    html += '<h2>' + (cert.type_name || '证明') + '</h2>';
    html += '<div class="pc-body">';
    // 根据类型生成不同的证明文本
    if (cert.type_id === 'cert_residence') {
      html += '兹证明 <strong>' + esc((cert.fields||{}).姓名||'___') + '</strong>，身份证号 ' + esc((cert.fields||{}).身份证号||'___') + '，性别 ' + esc((cert.fields||{}).性别||'__') + '，自 ' + esc((cert.fields||{})['居住时间起']||'____年__月__日') + ' 起至今居住于 ' + esc((cert.fields||{}).居住地址||'________') + '。情况属实，特此证明。';
    } else if (cert.type_id === 'cert_identity') {
      html += '兹证明 <strong>' + esc((cert.fields||{}).姓名||'___') + '</strong>，' + esc((cert.fields||{}).性别||'__') + '，' + esc((cert.fields||{}).民族||'__') + '族，出生于 ' + esc((cert.fields||{}).出生日期||'____年__月__日') + '，身份证号码 ' + esc((cert.fields||{}).身份证号||'______________') + '，住址 ' + esc((cert.fields||{}).住址||'_________________') + '。此证。';
    } else if (cert.type_id === 'cert_family_relation') {
      html += '兹证明 <strong>' + esc((cert.fields||{}).户主姓名||'___') + '</strong>（身份证号 ' + esc((cert.fields||{})['户主身份证号']||'___') + '）与 <strong>' + esc((cert.fields||{})['家庭成员姓名']||'___') + '</strong>（身份证号 ' + esc((cert.fields||{})['成员身份证号']||'___') + '）系 ' + esc((cert.fields||{})['与户主关系']||'_____') + ' 关系。特此证明。';
    } else {
      // 通用证明格式
      let bodyLines = ['兹证明：'];
      for (const [k, v] of Object.entries(cert.fields || {})) {
        if (v) bodyLines.push(k + '：' + v);
      }
      bodyLines.push('以上情况属实，特此证明。');
      html += bodyLines.join('<br/>');
    }
    html += '</div>';

  // 非阻塞式文件检查，每50ms检查一个，不卡UI
  function checkAllFilesLazy() {
    const items = [];
    (CONFIG.categories||[]).forEach(cat => {
      (cat.items||[]).forEach(item => {
        items.push({id: item.id, file: item.file});
      });
    });
    let i = 0;
    function checkNext() {
      if (i >= items.length) return;
      const it = items[i];
      i++;
      const statusEl = document.getElementById('status-' + it.id);
      if (statusEl) {
        if (!it.file || !it.file.trim()) {
          statusEl.className = 'card-status nofile';
          setTimeout(checkNext, 30);
        } else {
          apiCall('check_file', [it.file]).then(result => {
            statusEl.className = 'card-status ' + (result.exists ? 'ok' : 'missing');
            setTimeout(checkNext, 30);
          }).catch(() => {
            statusEl.className = 'card-status missing';
            setTimeout(checkNext, 30);
          });
        }
      } else {
        setTimeout(checkNext, 10);
      }
    }
    checkNext();
  }

  // ===== 标签页拖拽排序 =====
  let dragTab = null;
  function initTabDrag() {
    const tabs = document.querySelectorAll('.tab-item[draggable]');
    tabs.forEach(tab => {
      tab.addEventListener('dragstart', function(e) {
        dragTab = this;
        this.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });
      tab.addEventListener('dragend', function() {
        this.classList.remove('dragging');
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('drag-over'));
        dragTab = null;
        // 保存排序
        saveCurrentTabOrder();
      });
      tab.addEventListener('dragover', function(e) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        if (dragTab && dragTab !== this) {
          this.classList.add('drag-over');
        }
      });
      tab.addEventListener('dragleave', function() {
        this.classList.remove('drag-over');
      });
      tab.addEventListener('drop', function(e) {
        e.preventDefault();
        this.classList.remove('drag-over');
        if (dragTab && dragTab !== this) {
          const container = document.getElementById('tabsLeft');
          const allTabs = [...container.querySelectorAll('.tab-item')];
          const fromIdx = allTabs.indexOf(dragTab);
          const toIdx = allTabs.indexOf(this);
          if (fromIdx < toIdx) {
            container.insertBefore(dragTab, this.nextSibling);
          } else {
            container.insertBefore(dragTab, this);
          }
        }
      });
    });
  }

  async function saveCurrentTabOrder() {
    const container = document.getElementById('tabsLeft');
    const tabs = [...container.querySelectorAll('.tab-item')];
    const order = tabs.map(t => t.dataset.tab);
    try {
      await apiCall('save_tab_order', [order]);
    } catch(e) {}
  }

  async function applyTabOrder() {
    try {
      const data = await apiCall('get_tab_order');
      if (data.success && data.tab_order) {
        const container = document.getElementById('tabsLeft');
        const allTabs = [...container.querySelectorAll('.tab-item')];
        const tabMap = {};
        allTabs.forEach(t => { tabMap[t.dataset.tab] = t; });
        data.tab_order.forEach(tabId => {
          if (tabMap[tabId]) {
            container.appendChild(tabMap[tabId]);
          }
        });
        // Append any missing tabs
        allTabs.forEach(t => {
          if (!data.tab_order.includes(t.dataset.tab)) {
            container.appendChild(t);
          }
        });
      }
    } catch(e) {}
  }

    html += '<div style="background:#fff;border-radius:20px;padding:28px 24px;max-width:520px;width:92%;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.25);animation:slideUp 0.3s;">';
    html += '<div style="font-size:18px;font-weight:700;color:#8B0000;margin-bottom:16px;display:flex;align-items:center;gap:8px;"><span style="font-size:22px;">📂</span> 选择文件</div>';
    html += '<div id="filePickerList" style="max-height:50vh;overflow-y:auto;">';

      const displayName = f.name || f;

      html += '<div class="file-picker-item" onclick="selectThisFile(this.dataset.path)" data-path="' + safePath + '">';
      html += '<span style="font-size:20px;">📄</span>';
      html += '<span style="flex:1;font-size:14px;font-weight:600;color:#333;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + esc(displayName) + '</span>';

      html += '<div class="cards-grid" data-cat-id="' + cat.id + '">';

        const itemId = item.id || '';

        const delay = (cardIndex * 0.06) + 's';

        html += '<div class="card ' + item.color + editClass + '" draggable="true" data-name="' + esc(item.name) + '" data-file="' + escAttr(item.file||'') + '" data-id="' + itemId + '" data-cat-id="' + cat.id + '" data-has-children="' + hasChildren + '" onclick="handleCardClick(this)" style="animation-delay:' + delay + '">';

  // ===== 拖拽排序 =====
  let dragType = null; // 'section' 或 'card'
  let dragCatId = null; // 拖拽卡片时所属分类ID
  let dragStartX = 0, dragStartY = 0; // 记录拖拽起始位置
  let isDragging = false; // 是否正在真正拖拽中

  function initDragDrop() {
    // 分类区块拖拽
    document.querySelectorAll('.section[draggable="true"]').forEach(sec => {
      sec.addEventListener('dragstart', function(e) {
        dragType = 'section';
        isDragging = true;
        dragStartX = e.clientX; dragStartY = e.clientY;
        this.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', this.dataset.catId);
      });
      sec.addEventListener('dragend', function() {
        this.classList.remove('dragging');
        document.querySelectorAll('.section.drag-over').forEach(el => el.classList.remove('drag-over'));
        dragType = null;
        setTimeout(() => { isDragging = false; }, 50);
      });
      sec.addEventListener('dragover', function(e) {
        if (dragType !== 'section') return;
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        this.classList.add('drag-over');
      });
      sec.addEventListener('dragleave', function() {
        this.classList.remove('drag-over');
      });
      sec.addEventListener('drop', function(e) {
        e.preventDefault();
        this.classList.remove('drag-over');
        if (dragType !== 'section') return;
        const fromId = e.dataTransfer.getData('text/plain');
        const toId = this.dataset.catId;
        if (fromId === toId) return;
        // DOM 换位
        const fromEl = document.querySelector('.section[data-cat-id="' + fromId + '"]');
        if (fromEl && this.parentNode) {
          const sections = Array.from(this.parentNode.querySelectorAll('.section'));
          const fromIdx = sections.indexOf(fromEl);
          const toIdx = sections.indexOf(this);
          if (fromIdx < toIdx) {
            this.parentNode.insertBefore(fromEl, this.nextSibling);
          } else {
            this.parentNode.insertBefore(fromEl, this);
          }
        }
        // 保存新顺序
        const newOrder = Array.from(document.querySelectorAll('.section[data-cat-id]')).map(s => s.dataset.catId);
        apiCall('reorder_categories', [newOrder]).then(async () => {
          CONFIG = await apiCall('get_config');
        });
      });
    });

    // 卡片拖拽（同分类内排序）
    document.querySelectorAll('.card[draggable="true"]').forEach(card => {
      card.addEventListener('dragstart', function(e) {
        dragType = 'card';
        dragCatId = this.dataset.catId;
        isDragging = true;
        dragStartX = e.clientX; dragStartY = e.clientY;
        this.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', this.dataset.id);
        e.stopPropagation(); // 阻止冒泡到 section
      });
      card.addEventListener('dragend', function() {
        this.classList.remove('dragging');
        document.querySelectorAll('.card.drag-over').forEach(el => el.classList.remove('drag-over'));
        dragType = null;
        dragCatId = null;
        setTimeout(() => { isDragging = false; }, 50);
      });
      card.addEventListener('dragover', function(e) {
        if (dragType !== 'card') return;
        if (this.dataset.catId !== dragCatId) return; // 不同分类不允许
        e.preventDefault();
        e.stopPropagation();
        e.dataTransfer.dropEffect = 'move';
        this.classList.add('drag-over');
      });
      card.addEventListener('dragleave', function(e) {
        this.classList.remove('drag-over');
      });
      card.addEventListener('drop', function(e) {
        e.preventDefault();
        e.stopPropagation();
        this.classList.remove('drag-over');
        if (dragType !== 'card') return;
        if (this.dataset.catId !== dragCatId) return;
        const fromId = e.dataTransfer.getData('text/plain');
        const toId = this.dataset.id;
        if (fromId === toId) return;
        // DOM 换位
        const grid = this.parentNode;
        const cards = Array.from(grid.querySelectorAll('.card'));
        const fromCard = cards.find(c => c.dataset.id === fromId);
        if (fromCard) {
          const fromIdx = cards.indexOf(fromCard);
          const toIdx = cards.indexOf(this);
          if (fromIdx < toIdx) {
            grid.insertBefore(fromCard, this.nextSibling);
          } else {
            grid.insertBefore(fromCard, this);
          }
        }
        // 保存新顺序
        const newOrder = Array.from(grid.querySelectorAll('.card')).map(c => c.dataset.id);
        apiCall('reorder_items', [dragCatId, newOrder]).then(async () => {
          CONFIG = await apiCall('get_config');
        });
      });
    });
  }

  function esc(str) {
    return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function escAttr(str) {
    return String(str||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ===== 卡片点击 =====
  function handleCardClick(cardEl) {
    if (isDragging) return; // 拖拽中不触发点击
    if (isEditMode) return;  // 编辑模式下点卡片不触发打开
    const hasChildren = cardEl.dataset.hasChildren === 'true';
    const file = cardEl.dataset.file || '';
    const isExcel = /\.(xlsx|xls|csv|et)$/i.test(file);
    const isWordDocx = /\.docx$/i.test(file);
    const isOldDoc = /\.doc$/i.test(file);

    if (hasChildren) {
      showSubItems(cardEl.dataset.id);
    } else if (isExcel && file) {
      openExcelEditor(cardEl.dataset.name, file);
    } else if (isWordDocx && file) {
      openWordEditor(cardEl.dataset.name, file);
    } else if (isOldDoc && file) {
      // 旧版.doc直接调用系统程序打开
      showToast('正在用Word/WPS打开：' + cardEl.dataset.name + '...', '');
      apiCall('open_file', [file]).then(r => {
        if (r.success) showToast(cardEl.dataset.name + ' 已打开', 'success');
        else showToast(r.message, 'error');
      }).catch(() => showToast('打开失败', 'error'));
    } else {
      openFile(cardEl);
    }
  }

  // ===== 子栏目面板 =====
  function showSubItems(itemId) {
    // 找到对应的item数据
    let item = null;
    let catName = '';
    for (const cat of (CONFIG.categories||[])) {
      for (const it of (cat.items||[])) {
        if (it.id === itemId) { item = it; catName = cat.name; break; }
      }
      if (item) break;
    }
    if (!item) return;

    const children = item.children || [];
    const hasMainFile = item.file && item.file.trim();

    let html = '<div class="sub-overlay" onclick="if(event.target===this){this.remove();document.body.style.overflow=\'\'}">';
    html += '<div class="sub-panel">';

    // 头部
    html += '<div class="sub-header">';
    html += '<div class="sub-header-icon ' + item.color + '">' + item.emoji + '</div>';
    html += '<div class="sub-header-info">';
    html += '<div class="sub-header-name">' + esc(item.name) + '</div>';
    html += '<div class="sub-header-desc">' + esc(item.desc||'') + ' · ' + (children.length + (hasMainFile?1:0)) + '份文档</div>';
    html += '</div>';

  async function openFileByName(filename, name) {
    if (!filename) { showToast('未配置文件', 'error'); return; }
    // Excel文件用编辑器打开
    if (/\.(xlsx|xls|csv|et)$/i.test(filename)) {
      openExcelEditor(name, filename);
      return;
    }
    // .docx用内置编辑器打开
    if (/\.docx$/i.test(filename)) {
      openWordEditor(name, filename);
      return;
    }
    // .doc或其他文件直接调用系统程序打开
    await openFileWithToast(filename, name);
  }

  // ===== Excel编辑器 =====
  let excelState = {
    filename: '', sheetName: '', name: '',
    headers: [], allRows: [], filteredRows: [],
    page: 1, pageSize: 50, total: 0,
    editedCells: {},  // {rowIndex: {colIndex: newValue}}
    deletedRows: new Set(),
    addedRows: [],
