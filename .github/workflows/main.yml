name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | sdkmanager --licenses || true

      - name: Build APK with Gradle 8.5
        run: |
          cd extracted
          echo "=== 下载 Gradle 8.5 ==="
          curl -sSL -o gradle.zip https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle.zip
          rm gradle.zip
          
          echo "=== 构建 APK ==="
          ./gradle-8.5/bin/gradle assembleDebug --no-daemon 2>&1
          
          echo ""
          echo "=== 构建结果 ==="
          find app/build -name "*.apk" -type f 2>/dev/null || echo "没有找到 APK 文件"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: extracted/app/build/outputs/apk/debug/app-debug.apk

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          files: extracted/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
